<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar">
    <aside class="simple-sidebar">
        <div class="simple-sidebar-logo-container">
            <div class="simple-sidebar-logo">
                <img th:src="@{/images/logo-ccss.png}" alt="Logo CCSS">
            </div>

            <button class="toggle-sidebar-btn" onclick="toggleSidebar()">
                ☰
            </button>
        </div>

        <div class="simple-sidebar-brand">
            CCSS
        </div>

        <div class="simple-sidebar-user" th:if="${currentAppUser != null}">
            <div class="simple-sidebar-user-name"
                 th:text="${currentAppUser.nombreMostrado != null and !#strings.isEmpty(currentAppUser.nombreMostrado) ? currentAppUser.nombreMostrado : currentAppUser.username}">
                Usuario
            </div>
            <div class="simple-sidebar-user-email"
                 th:text="${currentAppUser.correo != null ? currentAppUser.correo : currentAppUser.username}">
                correo@correo.com
            </div>
        </div>

        <nav class="simple-sidebar-menu">
            <a th:each="m : ${allowedModules}"
                th:href="@{${m.path}}"
                class="simple-sidebar-link"
                th:title="${m.name}">

                <!-- ICONO -->
                <i class="sidebar-icon"
                    th:classappend="
                    ${m.code == 'REDES'} ? 'bi bi-diagram-3' :
                    (${m.code == 'USUARIOS'} ? 'bi bi-people' :
                    (${m.code == 'BITACORA'} ? 'bi bi-journal-text' :
                    'bi bi-circle'))">
                </i>

                <!-- TEXTO NORMAL -->
                <span class="sidebar-link-full"
                    th:text="${m.name}">
                </span>
            </a>

            <form th:action="@{/logout}" method="post" class="simple-sidebar-logout-form">
                <button type="submit" class="simple-sidebar-logout-btn" title="Salir">
                    <i class="sidebar-icon bi bi-box-arrow-right"></i>

                    <span class="sidebar-link-full">Salir</span>
                </button>
            </form>
        </nav>
    </aside>
</div>
</body>
</html>
