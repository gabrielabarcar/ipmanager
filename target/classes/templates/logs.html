<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bitácora del sistema</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="page-container">
    <main class="main-content">

        <div class="page-header">
            <h1>Bitácora del sistema</h1>
            <p>Registro de acciones realizadas por los usuarios</p>
        </div>

        <section class="content-card">

            <div class="mb-3">
                <a href="/" class="btn btn-secondary">← Volver</a>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Entidad</th>
                        <th>ID Entidad</th>
                        <th>Acción</th>
                        <th>Usuario</th>
                        <th>Detalle</th>
                        <th>Fecha</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="log : ${logs}">
                        <td th:text="${log.id}"></td>
                        <td th:text="${log.entityType}"></td>
                        <td th:text="${log.entityId}"></td>
                        <td>
                            <span th:text="${log.action}"
                                  th:classappend="
                                  ${log.action == 'CREATE'} ? 'badge bg-success' :
                                  (${log.action == 'UPDATE'} ? 'badge bg-primary' :
                                  (${log.action == 'DELETE'} ? 'badge bg-danger' :
                                  'badge bg-secondary'))">
                            </span>
                        </td>
                        <td th:text="${log.username}"></td>
                        <td th:text="${log.detail != null ? log.detail : '-'}"></td>
                        <td>
                            <span th:if="${log.createdAt != null}"
                                th:text="${#temporals.format(log.createdAt, 'dd/MM/yyyy HH:mm:ss')}"></span>
                            <span th:if="${log.createdAt == null}">-</span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="7" class="text-center text-muted">
                            No hay registros en la bitácora
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

        </section>

    </main>
</div>

</body>
</html>
